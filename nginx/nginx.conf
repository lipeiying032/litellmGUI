user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
worker_connections 4096;
multi_accept on;
}

http {
include       /etc/nginx/mime.types;
default_type  application/octet-stream;


log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                '$status $body_bytes_sent "$http_referer" '
                '"$http_user_agent" rt=$request_time';

access_log /var/log/nginx/access.log main;

sendfile        on;
tcp_nopush      on;
tcp_nodelay     on;
keepalive_timeout 65;

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript
           application/xml+rss application/atom+xml image/svg+xml;

# BUG FIX: 使用 Docker 内部 DNS resolver 实现动态解析。
# 不加这行时，nginx 启动时若 upstream 主机名还未注册到 Docker DNS
# 会直接报 "host not found in upstream" 导致崩溃。
# 127.0.0.11 是 Docker 内置 DNS 服务器地址。
resolver 127.0.0.11 valid=10s ipv6=off;

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=v1:10m rate=200r/m;

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;

    # ── OpenAI-compatible AI API endpoints (via LiteLLM) ──────────────
    location /v1/ {
        limit_req zone=v1 burst=50 nodelay;

        set $litellm_upstream http://litellm:4000;
        proxy_pass $litellm_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
    }

    # ── Backend Management API ────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Frontend SPA ──────────────────────────────────────────────────
    location / {
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
    }
}


}